name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: CompanyPlannerCsvExporter-Windows
            executable: CompanyPlannerCsvExporter.exe
            node_path: publish/.playwright/node/win32_x64/node.exe
          - os: macos-latest
            rid: osx-arm64
            artifact_name: CompanyPlannerCsvExporter-macOS
            executable: CompanyPlannerCsvExporter
            node_path: publish/.playwright/node/darwin-arm64/node

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Apply production appsettings
        shell: bash
        run: cp src/CompanyPlannerCsvPerser/appsettings.Release.json src/CompanyPlannerCsvPerser/appsettings.json

      - name: Publish self-contained app
        shell: bash
        run: >
          dotnet publish src/CompanyPlannerCsvPerser/CompanyPlannerCsvPerser.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o publish

      - name: Verify Playwright driver in publish output
        shell: bash
        run: |
          if [ ! -f "${{ matrix.node_path }}" ]; then
            echo "Playwright node driver missing at ${{ matrix.node_path }}"
            find publish/.playwright -type f | head -50 || true
            exit 1
          fi
          echo "Found Playwright driver at ${{ matrix.node_path }}"

      - name: Prepare distribution folder
        shell: bash
        run: |
          mkdir -p dist
          cp -R publish/. dist/
          cp -R publish/.playwright dist/playwright-bundle
          rm -f dist/*.pdb
          cp distribution/README-CLIENT.txt dist/README.txt
          if [ "${{ matrix.rid }}" = "osx-arm64" ]; then
            chmod +x "dist/${{ matrix.executable }}"
            chmod +x dist/.playwright/node/darwin-arm64/node
            chmod +x dist/playwright-bundle/node/darwin-arm64/node
            codesign --force --deep --sign - "dist/${{ matrix.executable }}" || true
          fi

      - name: Validate package contents
        shell: bash
        run: |
          test -d dist/playwright-bundle
          test -f "dist/${{ matrix.executable }}"
          test -f dist/appsettings.json
          "./dist/${{ matrix.executable }}" --validate-package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: CompanyPlannerCsvExporter-Windows
          path: release/windows

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: CompanyPlannerCsvExporter-macOS
          path: release/macos

      - name: Package Windows zip
        shell: bash
        run: |
          cd release/windows
          zip -r ../CompanyPlannerCsvExporter-Windows.zip .

      - name: Package macOS zip
        shell: bash
        run: |
          cd release/macos
          chmod +x CompanyPlannerCsvExporter
          chmod +x playwright-bundle/node/darwin-arm64/node
          zip -r ../CompanyPlannerCsvExporter-macOS.zip .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/CompanyPlannerCsvExporter-Windows.zip
            release/CompanyPlannerCsvExporter-macOS.zip
          generate_release_notes: true
