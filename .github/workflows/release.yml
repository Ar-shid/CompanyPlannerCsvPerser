name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: CompanyPlannerCsvExporter-Windows
            executable: CompanyPlannerCsvExporter.exe
          - os: macos-latest
            rid: osx-arm64
            artifact_name: CompanyPlannerCsvExporter-macOS
            executable: CompanyPlannerCsvExporter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Apply production appsettings
        shell: bash
        run: cp src/CompanyPlannerCsvPerser/appsettings.Release.json src/CompanyPlannerCsvPerser/appsettings.json

      - name: Publish single-file app
        shell: bash
        run: >
          dotnet publish src/CompanyPlannerCsvPerser/CompanyPlannerCsvPerser.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o publish

      - name: Bundle Playwright driver
        shell: bash
        run: |
          DRIVER_SOURCE="src/CompanyPlannerCsvPerser/bin/Release/net8.0/${{ matrix.rid }}/.playwright"
          cp -R "$DRIVER_SOURCE" publish/.playwright
          cp "src/CompanyPlannerCsvPerser/bin/Release/net8.0/${{ matrix.rid }}/playwright.ps1" publish/ 2>/dev/null || true
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            cp "src/CompanyPlannerCsvPerser/bin/Release/net8.0/${{ matrix.rid }}/playwright.cmd" publish/ 2>/dev/null || true
          fi

      - name: Prepare distribution folder
        shell: bash
        run: |
          mkdir -p dist
          cp "publish/${{ matrix.executable }}" "dist/${{ matrix.executable }}"
          cp publish/appsettings.json dist/appsettings.json
          cp -R publish/.playwright dist/.playwright
          cp publish/playwright.ps1 dist/ 2>/dev/null || true
          if [ -f publish/playwright.cmd ]; then
            cp publish/playwright.cmd dist/
          fi
          cp distribution/README-CLIENT.txt dist/README.txt
          if [ "${{ matrix.rid }}" = "osx-arm64" ]; then
            chmod +x "dist/${{ matrix.executable }}"
            codesign --force --deep --sign - "dist/${{ matrix.executable }}" || true
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: CompanyPlannerCsvExporter-Windows
          path: release/windows

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: CompanyPlannerCsvExporter-macOS
          path: release/macos

      - name: Package Windows zip
        shell: bash
        run: |
          cd release/windows
          zip -r ../CompanyPlannerCsvExporter-Windows.zip .

      - name: Package macOS zip
        shell: bash
        run: |
          cd release/macos
          chmod +x CompanyPlannerCsvExporter
          zip -r ../CompanyPlannerCsvExporter-macOS.zip .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/CompanyPlannerCsvExporter-Windows.zip
            release/CompanyPlannerCsvExporter-macOS.zip
          generate_release_notes: true
